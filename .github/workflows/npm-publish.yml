name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# Required for npm provenance attestation via OIDC
permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build binaries & publish with provenance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync package version
        run: |
          cd npm
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = '${{ steps.version.outputs.VERSION }}';
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const dep of Object.keys(pkg.optionalDependencies)) {
                if (dep.startsWith('git-userhub-')) {
                  pkg.optionalDependencies[dep] = '^' + version;
                }
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build all platform binaries
        run: node npm/scripts/build-packages.js

      - name: Publish sub-packages (platform-specific binaries)
        run: |
          for dir in npm/packages/git-userhub-*/; do
            echo "Publishing $dir ..."
            for i in {1..3}; do
              if npm publish "$dir" --provenance --access public; then
                echo "Successfully published $dir"
                break
              else
                if [ $i -eq 3 ]; then
                  echo "Failed to publish $dir after 3 attempts."
                  exit 1
                fi
                echo "Publish failed. Retrying in 15 seconds (attempt $((i+1)))..."
                sleep 15
              fi
            done
            sleep 5
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish wrapper package
        run: npm publish --provenance --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
