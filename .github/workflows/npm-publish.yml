name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# Required for npm provenance attestation via OIDC
permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build binaries & publish with provenance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync package version
        run: |
          cd npm
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.VERSION }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build all platform binaries
        run: node npm/scripts/build-packages.js

      - name: Publish sub-packages (platform-specific binaries)
        run: |
          for dir in npm/packages/git-userhub-*/; do
            echo "Publishing $dir ..."
            npm publish "$dir" --provenance --access public
            sleep 5
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish wrapper package
        run: npm publish --provenance --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
